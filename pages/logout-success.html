<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Until Next Time | Indigo Art Hub</title>
                <link rel="stylesheet" href="../css/style.css">
                    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
                    </head>
                    <body class="profile-immersive" style="min-height: 100vh; display: flex; flex-direction: column;">

                        <nav class="navbar">
                                <a href="../index.html" class="logo-link">
                                            <div class="logo-container" style="display: flex; align-items: center; gap: 12px; padding: 5px 0;">
                                                            <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="height: 45px; width: 45px;">
                                                                                <circle cx="50" cy="50" r="48" stroke="#D4AF37" stroke-width="4" fill="none"/>
                                                                                                    <path d="M50 20C40.6667 36.6667 40.6667 63.3333 50 80C59.3333 63.3333 59.3333 36.6667 50 20Z" fill="#D4AF37"/>
                                                                                                                        <path d="M20 50C36.6667 40.6667 63.3333 40.6667 80 50C63.3333 59.3333 36.6667 59.3333 20 50Z" fill="#D4AF37"/>
                                                                                                                                            <circle cx="50" cy="50" r="8" fill="#ffffff"/>
                                                                                                                                                            </svg>
                                                                                                                                                                            <span class="logo-text" style="font-weight: 700; letter-spacing: 1px;">INDIGO<span class="hub-accent">ARTHUB</span></span>
                                                                                                                                                                                        </div>
                                                                                                                                                                                                </a>
                                                                                                                                                                                                    </nav>

                                                                                                                                                                                                        <div class="login-page-wrapper" style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 5%;">
                                                                                                                                                                                                                <div class="login-box glass-header" style="text-align: center; padding: 0; max-width: 500px; background: rgba(8, 16, 49, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.3); overflow: hidden;"> 
                                                                                                                                                                                                                            
                                                                                                                                                                                                                                        <div class="success-banner" style="width: 100%; height: 160px; overflow: hidden; border-bottom: 1px solid rgba(212, 175, 55, 0.2);">
                                                                                                                                                                                                                                                        <img src="../assets/images/site/adire-pattern.jpg" alt="Artisan Heritage" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.4;"> 
                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                            <div class="success-icon-wrapper" style="margin-top: -45px; position: relative; z-index: 5;">
                                                                                                                                                                                                                                                                                                            <div style="font-size: 2.8rem; background: #050a1f; display: inline-block; padding: 15px; border-radius: 50%; border: 3px solid #D4AF37; box-shadow: 0 10px 30px rgba(0,0,0,0.6);">🕯️</div>
                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                    <div class="success-content" style="padding: 35px 45px 55px;">
                                                                                                                                                                                                                                                                                                                                                    <h1 style="font-family: var(--font-heading); font-size: 2.2rem; margin-bottom: 15px;">Safe <span class="highlight">Journeys</span></h1>
                                                                                                                                                                                                                                                                                                                                                                    <p style="color: #fff; line-height: 1.8; margin-bottom: 30px; font-size: 1rem;">
                                                                                                                                                                                                                                                                                                                                                                                        Thank you for contributing to the record. Your craftsmanship keeps the heart of Osun beating in the digital world.
                                                                                                                                                                                                                                                                                                                                                                                                        </p>
                                                                                                                                                                                                                                                                                                                                                                                                                        <div style="display: flex; flex-direction: column; gap: 15px;">
                                                                                                                                                                                                                                                                                                                                                                                                                                            <a href="../index.html" class="btn btn-gold" style="text-decoration: none; width: 100%;">Return to Home</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p style="color: #777; font-size: 0.8rem; margin-top: 10px;">Redirecting you automatically in <span id="timer">5</span> seconds...</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Countdown and Auto-Redirect
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let seconds = 5;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const timerElement = document.getElementById('timer');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const countdown = setInterval(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                seconds--;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            timerElement.textContent = seconds;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (seconds <= 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        clearInterval(countdown);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        window.location.href = "../index.html";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }, 1000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
